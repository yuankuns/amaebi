name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build dev image (if missing)
        run: |
          if ! docker image inspect amaebi-dev:bookworm-slim &>/dev/null; then
            docker build -t amaebi-dev:bookworm-slim docker/dev
          fi

      - name: Fmt
        run: |
          docker run --rm \
            -w "$GITHUB_WORKSPACE" \
            -v "$GITHUB_WORKSPACE:$GITHUB_WORKSPACE:rw" \
            -e CARGO_HOME=/opt/cargo \
            -e RUSTUP_HOME=/opt/rustup \
            -e HOME=/home/builder \
            amaebi-dev:bookworm-slim \
            cargo fmt --check

      - name: Clippy
        run: |
          docker run --rm \
            -w "$GITHUB_WORKSPACE" \
            -v "$GITHUB_WORKSPACE:$GITHUB_WORKSPACE:rw" \
            -e CARGO_HOME=/opt/cargo \
            -e RUSTUP_HOME=/opt/rustup \
            -e HOME=/home/builder \
            amaebi-dev:bookworm-slim \
            cargo clippy -- -D warnings

      - name: Test
        run: |
          docker run --rm \
            -w "$GITHUB_WORKSPACE" \
            -v "$GITHUB_WORKSPACE:$GITHUB_WORKSPACE:rw" \
            -e CARGO_HOME=/opt/cargo \
            -e RUSTUP_HOME=/opt/rustup \
            -e HOME=/home/builder \
            -e RUST_BACKTRACE=1 \
            amaebi-dev:bookworm-slim \
            cargo test

      - name: Build (release)
        run: |
          docker run --rm \
            -w "$GITHUB_WORKSPACE" \
            -v "$GITHUB_WORKSPACE:$GITHUB_WORKSPACE:rw" \
            -e CARGO_HOME=/opt/cargo \
            -e RUSTUP_HOME=/opt/rustup \
            -e HOME=/home/builder \
            amaebi-dev:bookworm-slim \
            cargo build --release

      - name: Doc
        run: |
          docker run --rm \
            -w "$GITHUB_WORKSPACE" \
            -v "$GITHUB_WORKSPACE:$GITHUB_WORKSPACE:rw" \
            -e CARGO_HOME=/opt/cargo \
            -e RUSTUP_HOME=/opt/rustup \
            -e HOME=/home/builder \
            amaebi-dev:bookworm-slim \
            cargo doc --no-deps
